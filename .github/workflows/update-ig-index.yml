name: Update IG registry

on:
  repository_dispatch:
    types: [ig-deployed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Update registry.json
        if: github.event_name == 'repository_dispatch'
        env:
          IG_NAME: ${{ github.event.client_payload.ig_name }}
          IG_TITLE: ${{ github.event.client_payload.ig_title }}
          IG_DESCRIPTION: ${{ github.event.client_payload.ig_description }}
          IG_VERSION: ${{ github.event.client_payload.ig_version }}
          IS_RELEASE: ${{ github.event.client_payload.is_release }}
        run: |
          python3 - <<'EOF'
          import json, os, pathlib
          reg_path = pathlib.Path('ig/registry.json')
          registry = json.loads(reg_path.read_text()) if reg_path.exists() else {}
          name = os.environ['IG_NAME']
          entry = registry.get(name, {})
          entry['name']        = name
          entry['title']       = os.environ['IG_TITLE']
          entry['description'] = os.environ['IG_DESCRIPTION']
          if os.environ.get('IS_RELEASE') == 'true':
              entry['latest_version'] = os.environ['IG_VERSION']
          registry[name] = entry
          reg_path.parent.mkdir(parents=True, exist_ok=True)
          reg_path.write_text(json.dumps(registry, indent=2, ensure_ascii=False) + '\n')
          EOF

      - name: Regenerate ig/index.html
        run: |
          python3 - <<'EOF'
          import json, pathlib, textwrap
          reg_path = pathlib.Path('ig/registry.json')
          registry = json.loads(reg_path.read_text()) if reg_path.exists() else {}
          card_parts = []
          for ig in sorted(registry.values(), key=lambda x: x['title']):
              ver = ig.get('latest_version', '')
              href = f'/ig/{ig["name"]}/{ver}/' if ver else f'/ig/{ig["name"]}/'
              ver_badge = f'<span class="tag">v{ver}</span>' if ver else ''
              base_url = f'https://github.com/inera-ab/{ig["name"]}'
              card_parts.append(
                  f'    <a class="ig-card" href="{href}">\n'
                  f'      <h3>{ig["title"]}</h3>\n'
                  f'      <p>{ig.get("description", "")}</p>\n'
                  f'      <div class="ig-card-footer">\n'
                  f'        {ver_badge}\n'
                  f'        <div class="ig-links">\n'
                  f'          <a class="ig-link" href="{base_url}/releases/latest" onclick="event.stopPropagation()">Senaste release</a>\n'
                  f'          <a class="ig-link" href="{base_url}" onclick="event.stopPropagation()">K\xe4llkod</a>\n'
                  f'        </div>\n'
                  f'      </div>\n'
                  f'    </a>'
              )
          if card_parts:
              cards_html = '\n'.join(card_parts)
          else:
              cards_html = '    <div class="empty-state">\n      <p>Inga implementation guides har publicerats \xe4nnu.</p>\n    </div>'
          html = textwrap.dedent("""\
          <!DOCTYPE html>
          <html lang="sv">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>FHIR Implementation Guides – Inera</title>
            <style>
              :root {
                --inera-blue: #005b9c;
                --inera-light-blue: #e6f0f8;
                --text: #333;
                --text-light: #666;
                --border: #d0dce8;
                --card-shadow: 0 2px 8px rgba(0,91,156,0.10);
              }
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #f4f7fb;
                color: var(--text);
                min-height: 100vh;
              }
              header {
                background: var(--inera-blue);
                color: white;
                padding: 2rem 1.5rem;
                box-shadow: 0 2px 8px rgba(0,0,0,0.15);
              }
              header .inner { max-width: 900px; margin: 0 auto; }
              header nav { font-size: 0.85rem; opacity: 0.75; margin-bottom: 0.5rem; }
              header nav a { color: white; text-decoration: none; }
              header nav a:hover { text-decoration: underline; }
              header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.01em; }
              header p { margin-top: 0.4rem; opacity: 0.85; font-size: 0.95rem; }
              main { max-width: 900px; margin: 2.5rem auto; padding: 0 1.5rem; }
              h2 {
                font-size: 1.1rem;
                color: var(--inera-blue);
                text-transform: uppercase;
                letter-spacing: 0.06em;
                margin-bottom: 1rem;
                padding-bottom: 0.4rem;
                border-bottom: 2px solid var(--border);
              }
              .ig-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 1rem;
                margin-bottom: 2.5rem;
              }
              .ig-card {
                background: white;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.25rem 1.5rem;
                box-shadow: var(--card-shadow);
                transition: box-shadow 0.15s, transform 0.15s;
                text-decoration: none;
                color: inherit;
                display: flex;
                flex-direction: column;
                gap: 0.4rem;
              }
              .ig-card:hover { box-shadow: 0 4px 16px rgba(0,91,156,0.18); transform: translateY(-2px); }
              .ig-card h3 { font-size: 1rem; color: var(--inera-blue); }
              .ig-card p { font-size: 0.85rem; color: var(--text-light); line-height: 1.5; flex: 1; }
              .ig-card-footer { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.25rem; }
              .tag {
                display: inline-block;
                padding: 0.15rem 0.55rem;
                border-radius: 999px;
                font-size: 0.75rem;
                font-weight: 600;
                background: var(--inera-light-blue);
                color: var(--inera-blue);
              }
              .ig-links { display: flex; gap: 0.75rem; margin-left: auto; }
              .ig-link { font-size: 0.78rem; color: var(--inera-blue); text-decoration: none; }
              .ig-link:hover { text-decoration: underline; }
              .empty-state {
                background: white;
                border: 1px dashed var(--border);
                border-radius: 8px;
                padding: 2.5rem;
                text-align: center;
                color: var(--text-light);
              }
              footer {
                text-align: center;
                padding: 2rem;
                color: var(--text-light);
                font-size: 0.82rem;
                border-top: 1px solid var(--border);
                margin-top: 3rem;
              }
              footer a { color: var(--inera-blue); text-decoration: none; }
              footer a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
          <header>
            <div class="inner">
              <nav><a href="/">fhir.inera.se</a> &rsaquo; Implementation Guides</nav>
              <h1>FHIR Implementation Guides</h1>
              <p>Publicerade specifikationer fr\xe5n Inera AB</p>
            </div>
          </header>
          <main>
            <h2>Publicerade implementation guides</h2>
            <div class="ig-grid">
          __CARDS__
            </div>
          </main>
          <footer>
            <p>Utf\xf6rt av <a href="https://www.inera.se">Inera AB</a> &middot;
               K\xe4llkod p\xe5 <a href="https://github.com/inera-ab/fhir-portal">GitHub</a></p>
          </footer>
          </body>
          </html>
          """).replace('__CARDS__', cards_html)
          out = pathlib.Path('ig/index.html')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(html)
          print(f"Generated ig/index.html with {len(registry)} IG(s)")
          EOF

      - name: Commit and push
        env:
          IG_LABEL: ${{ github.event.client_payload.ig_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ig/
          MSG="chore: update IG registry"
          [ -n "$IG_LABEL" ] && MSG="$MSG for $IG_LABEL"
          git diff --cached --quiet || git commit -m "$MSG"
          git push origin gh-pages
