name: Update IG registry

on:
  repository_dispatch:
    types: [ig-deployed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Update registry.json
        if: github.event_name == 'repository_dispatch'
        env:
          IG_NAME: ${{ github.event.client_payload.ig_name }}
          IG_TITLE: ${{ github.event.client_payload.ig_title }}
          IG_DESCRIPTION: ${{ github.event.client_payload.ig_description }}
          IG_VERSION: ${{ github.event.client_payload.ig_version }}
          IS_RELEASE: ${{ github.event.client_payload.is_release }}
        run: |
          python3 - <<'EOF'
          import json, os, pathlib
          reg_path = pathlib.Path('ig/registry.json')
          registry = json.loads(reg_path.read_text()) if reg_path.exists() else {}
          name = os.environ['IG_NAME']
          entry = registry.get(name, {})
          entry['name']        = name
          entry['title']       = os.environ['IG_TITLE']
          entry['description'] = os.environ['IG_DESCRIPTION']
          if os.environ.get('IS_RELEASE') == 'true':
              entry['latest_version'] = os.environ['IG_VERSION']
          registry[name] = entry
          reg_path.parent.mkdir(parents=True, exist_ok=True)
          reg_path.write_text(json.dumps(registry, indent=2, ensure_ascii=False) + '\n')
          EOF

      - name: Regenerate ig/index.html
        run: |
          python3 - <<'EOF'
          import json, pathlib, textwrap
          reg_path = pathlib.Path('ig/registry.json')
          registry = json.loads(reg_path.read_text()) if reg_path.exists() else {}
          card_parts = []
          for ig in sorted(registry.values(), key=lambda x: x['title']):
              ver = ig.get('latest_version', '')
              href = f'/ig/{ig["name"]}/{ver}/' if ver else f'/ig/{ig["name"]}/'
              ver_badge = f'<span class="tag">v{ver}</span>' if ver else ''
              base_url = f'https://github.com/inera-ab/{ig["name"]}'
              ci_url = f'https://inera-ab.github.io/{ig["name"]}/'
              card_parts.append(
                  f'    <a class="ig-card" href="{href}">\n'
                  f'      <h3>{ig["title"]}</h3>\n'
                  f'      <p>{ig.get("description", "")}</p>\n'
                  f'      <div class="ig-card-footer">\n'
                  f'        {ver_badge}\n'
                  f'        <div class="ig-links">\n'
                  f'          <a class="ig-link" href="{ci_url}" onclick="event.stopPropagation()">CI Build</a>\n'
                  f'          <a class="ig-link" href="{base_url}" onclick="event.stopPropagation()">K\xe4llkod</a>\n'
                  f'        </div>\n'
                  f'      </div>\n'
                  f'    </a>'
              )
          if card_parts:
              cards_html = '\n'.join(card_parts)
          else:
              cards_html = '    <div class="empty-state">\n      <p>Inga implementation guides har publicerats \xe4nnu.</p>\n    </div>'
          html = textwrap.dedent("""\
          <!DOCTYPE html>
          <html lang="sv">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Implementation Guides – Inera FHIR</title>
            <link rel="icon" href="/assets/images/inera-thumbnail.png">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=fallback">
            <style>
              :root {
                --primary:       #A33662;
                --primary-dark:  #7E2A4C;
                --primary-light: #C03F73;
                --bg:            #F9F6F1;
                --text:          #353636;
                --text-mid:      #727373;
                --border:        #CCCCCC;
              }
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: 'Open Sans', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
              .page-header { background: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,.2); }
              .header-inner { max-width: 960px; margin: 0 auto; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; gap: 1rem; }
              .header-logo img { height: 32px; width: auto; }
              .header-title { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1rem; color: white; text-decoration: none; flex: 1; }
              .page-tabs { background: var(--primary-dark); }
              .tabs-inner { max-width: 960px; margin: 0 auto; padding: 0 0.5rem; display: flex; }
              .tab-link { color: rgba(255,255,255,0.8); text-decoration: none; font-weight: 600; font-size: 0.85rem; padding: 0.75rem 1rem; display: inline-block; }
              .tab-link:hover { color: white; text-decoration: underline; }
              .tab-link.active { color: white; border-bottom: 2px solid white; }
              main { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }
              h1 { font-family: 'Poppins', sans-serif; color: var(--primary-dark); font-size: 1.5rem; font-weight: 700; border-bottom: 3px solid var(--primary); padding-bottom: 0.3em; margin-bottom: 1.5rem; }
              .ig-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 2.5rem; }
              .ig-card { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 1.25rem 1.5rem; box-shadow: 0 1px 4px rgba(163,54,98,0.08); transition: box-shadow 0.15s, transform 0.15s; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 0.4rem; }
              .ig-card:hover { box-shadow: 0 4px 16px rgba(163,54,98,0.20); transform: translateY(-2px); }
              .ig-card h3 { font-family: 'Poppins', sans-serif; font-size: 1rem; color: var(--primary-dark); overflow-wrap: break-word; min-width: 0; }
              .ig-card p { font-size: 0.85rem; color: var(--text-mid); line-height: 1.5; flex: 1; overflow-wrap: break-word; min-width: 0; }
              .ig-card-footer { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.25rem; flex-wrap: wrap; }
              .tag { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; background: #f9edf3; color: var(--primary); }
              .ig-links { display: flex; gap: 0.75rem; margin-left: auto; }
              .ig-link { font-size: 0.78rem; color: var(--primary-dark); text-decoration: underline; }
              .ig-link:hover { color: var(--primary); }
              .empty-state { background: white; border: 1px dashed var(--border); border-radius: 6px; padding: 2.5rem; text-align: center; color: var(--text-mid); }
              footer { background: var(--primary-dark); color: rgba(255,255,255,0.85); text-align: center; padding: 1.5rem; font-size: 0.82rem; margin-top: 3rem; }
              footer a { color: #ffd4e8; text-decoration: underline; }
              footer a:hover { color: white; }
            </style>
          </head>
          <body>
          <header class="page-header">
            <div class="header-inner">
              <a href="/"><img src="/assets/images/inera-logo.svg" alt="Inera" class="header-logo" style="height:32px;width:auto"></a>
              <a href="/" class="header-title">Inera's FHIR Standards</a>
            </div>
          </header>
          <nav class="page-tabs">
            <div class="tabs-inner">
              <a href="/" class="tab-link">Hem</a>
              <a href="/ig/" class="tab-link active">Implementation Guides</a>
            </div>
          </nav>
          <main>
            <h1>Publicerade Implementation Guides</h1>
            <div class="ig-grid">
          __CARDS__
            </div>
          </main>
          <footer>
            <p>Utf\xf6rt av <a href="https://www.inera.se">Inera AB</a> &middot;
               K\xe4llkod p\xe5 <a href="https://github.com/inera-ab/fhir-portal">GitHub</a></p>
          </footer>
          </body>
          </html>
          """).replace('__CARDS__', cards_html)
          out = pathlib.Path('ig/index.html')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(html)
          print(f"Generated ig/index.html with {len(registry)} IG(s)")
          EOF

      - name: Commit and push
        env:
          IG_LABEL: ${{ github.event.client_payload.ig_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ig/
          MSG="chore: update IG registry"
          [ -n "$IG_LABEL" ] && MSG="$MSG for $IG_LABEL"
          git diff --cached --quiet || git commit -m "$MSG"
          git push origin gh-pages
