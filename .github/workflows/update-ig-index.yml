name: Update IG registry

on:
  repository_dispatch:
    types: [ig-deployed]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Update registry.json
        env:
          IG_NAME: ${{ github.event.client_payload.ig_name }}
          IG_TITLE: ${{ github.event.client_payload.ig_title }}
          IG_DESCRIPTION: ${{ github.event.client_payload.ig_description }}
          IG_VERSION: ${{ github.event.client_payload.ig_version }}
          IS_RELEASE: ${{ github.event.client_payload.is_release }}
        run: |
          python3 - <<'EOF'
          import json, os, pathlib
          reg_path = pathlib.Path('ig/registry.json')
          registry = json.loads(reg_path.read_text()) if reg_path.exists() else {}
          name = os.environ['IG_NAME']
          entry = registry.get(name, {})
          entry['name']        = name
          entry['title']       = os.environ['IG_TITLE']
          entry['description'] = os.environ['IG_DESCRIPTION']
          if os.environ.get('IS_RELEASE') == 'true':
              entry['latest_version'] = os.environ['IG_VERSION']
          registry[name] = entry
          reg_path.parent.mkdir(parents=True, exist_ok=True)
          reg_path.write_text(json.dumps(registry, indent=2, ensure_ascii=False) + '\n')
          EOF

      - name: Regenerate ig/index.html
        run: |
          python3 - <<'EOF'
          import json, pathlib

          registry = json.loads(pathlib.Path('ig/registry.json').read_text())

          cards = ''
          for ig in sorted(registry.values(), key=lambda x: x['title']):
              ver   = ig.get('latest_version', '')
              badge = f'<span class="ig-version">v{ver}</span>' if ver else ''
              ver_link = f'· <a href="/ig/{ig["name"]}/{ver}/">v{ver}</a>' if ver else ''
              cards += f"""
              <article class="ig-card">
                <h2><a href="/ig/{ig['name']}/history.html">{ig['title']}</a> {badge}</h2>
                <p>{ig.get('description', '')}</p>
                <nav>
                  <a href="/ig/{ig['name']}/history.html">Version history</a>
                  {ver_link}
                </nav>
              </article>"""

          html = f"""<!DOCTYPE html>
          <html lang="sv">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Inera FHIR Implementation Guides</title>
            <link href="/inera.css" rel="stylesheet">
          </head>
          <body>
            <main>
              <h1>FHIR Implementation Guides</h1>
              {cards if cards else '<p>Inga implementation guides har publicerats ännu.</p>'}
            </main>
          </body>
          </html>"""

          pathlib.Path('ig/index.html').write_text(html)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ig/registry.json ig/index.html
          git diff --cached --quiet || git commit -m "chore: update IG registry for ${{ github.event.client_payload.ig_name }}"
          git push origin gh-pages
